<template>

    <!-- MEMBER DASHBOARD -->
    <template if:false={showTransactions}>

        <template if:true={familyId}>

            <lightning-card title="Member Dashboard">

                <!-- TOP BUTTONS -->
                <div class="slds-grid slds-grid_align-end slds-m-bottom_small">
                    <!-- VIEW TRANSACTION -->
                    <lightning-button
                        label="View Transactions"
                        icon-name="utility:money"
                        variant="brand"
                        onclick={openTransactions}>
                    </lightning-button>

                    <!-- ADD MEMBER -->
                    <lightning-button 
                        label="Add Member"
                        icon-name="utility:user" 
                        variant="brand"
                        onclick={openModal}>
                    </lightning-button>

                </div>

                <!-- SEARCH -->
                <lightning-input
                    type="search"
                    label="Search Member"
                    onchange={handleSearch}>
                </lightning-input>

                <!-- TABLE -->
                <lightning-datatable
                    key-field="Id"
                    data={members}
                    columns={columns}
                    onrowaction={handleRowAction}>
                </lightning-datatable>

            </lightning-card>

        </template>

    </template>

    <!-- TRANSACTION PAGE -->
    <template if:true={showTransactions}>

        <lightning-button
            label="⬅ Back"
            onclick={handleBackTransaction}>
        </lightning-button>

        <c-transaction
            family-id={familyId}>
        </c-transaction>

    </template>

    <!-- ADD MEMBER MODAL -->
    <template if:true={showModal}>

        <section class="slds-modal slds-fade-in-open">

            <div class="slds-modal__container">

                <header class="slds-modal__header">
                    <h2>Add Member</h2>
                </header>

                <div class="slds-modal__content slds-p-around_medium">

                    <lightning-input 
                        label="Name"
                        onchange={handleName}>
                    </lightning-input>

                    <lightning-input 
                        label="Address"
                        onchange={handleAddress}>
                    </lightning-input>

                    <lightning-input 
                        type="number"
                        label="Age"
                        onchange={handleAge}>
                    </lightning-input>

                    <lightning-input 
                        label="Phone"
                        onchange={handlePhone}>
                    </lightning-input>

                </div>

                <footer class="slds-modal__footer">

                    <lightning-button
                        label="Cancel"
                        onclick={closeModal}>
                    </lightning-button>

                    <lightning-button
                        label="Save"
                        variant="brand"
                        onclick={handlesaveMember}>
                    </lightning-button>

                </footer>

            </div>

        </section>

        <div class="slds-backdrop slds-backdrop_open"></div>

    </template>

    <!-- EDIT MODAL -->
    <template if:true={showEditModal}>

        <section class="slds-modal slds-fade-in-open">

            <div class="slds-modal__container">

                <header class="slds-modal__header">
                    <h2>Edit Member</h2>
                </header>

                <div class="slds-modal__content slds-p-around_medium">

                    <lightning-input
                        label="Name"
                        value={name}
                        onchange={handleName}>
                    </lightning-input>

                    <lightning-input
                        label="Address"
                        value={address}
                        onchange={handleAddress}>
                    </lightning-input>

                    <lightning-input
                        type="number"
                        label="Age"
                        value={age}
                        onchange={handleAge}>
                    </lightning-input>

                    <lightning-input
                        label="Phone"
                        value={phone}
                        onchange={handlePhone}>
                    </lightning-input>

                </div>

                <footer class="slds-modal__footer">

                    <lightning-button
                        label="Cancel"
                        onclick={closeEditModal}>
                    </lightning-button>

                    <lightning-button
                        label="Update"
                        variant="brand"
                        onclick={updateMemberHandler}>
                    </lightning-button>

                </footer>

            </div>

        </section>

        <div class="slds-backdrop slds-backdrop_open"></div>

    </template>

    <!-- DELETE MODAL -->
    <template if:true={showDeleteModal}>

        <section class="slds-modal slds-fade-in-open">

            <div class="slds-modal__container">

                <header class="slds-modal__header">
                    <h2>Confirm Delete</h2>
                </header>

                <div class="slds-modal__content slds-p-around_medium">

                    <p>
                        Are you sure you want to delete "{name}"?
                    </p>

                </div>

                <footer class="slds-modal__footer">

                    <lightning-button
                        label="Cancel"
                        onclick={closeDeleteModal}>
                    </lightning-button>

                    <lightning-button
                        label="Delete"
                        variant="destructive"
                        onclick={confirmDelete}>
                    </lightning-button>

                </footer>

            </div>

        </section>

        <div class="slds-backdrop slds-backdrop_open"></div>

    </template>

</template>
