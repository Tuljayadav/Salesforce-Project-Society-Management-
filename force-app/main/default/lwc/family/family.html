<template>

    <!--  FAMILY SCREEN -->
    <template if:false={showMembers}>

        <lightning-card title="Family Dashboard">
            
         <!-- ADD BUTTON (RIGHT SIDE) -->
    
    <div class="slds-grid slds-grid_align-end slds-wrap slds-p-horizontal_small slds-m-bottom_small">
        <!-- DELETE SELECTED -->
        <template if:true={selectedRows.length}>
            <lightning-button
                label="Delete Selected"
                icon-name="utility:delete"
                variant="destructive"
                class="slds-m-right_small"
                onclick={handleBulkDelete}>
            </lightning-button>
          </template>

    <!-- ADD FAMILY -->
    <lightning-button 
        label="Add Family"
        icon-name="utility:user" 
        variant="brand"
        onclick={openModal}>
    </lightning-button>

    </div>
            <div class="slds-col slds-size_1-of-1 slds-m-bottom_small">

                <!-- SEARCH -->
                <lightning-input
                    type="search"
                    label="Search"
                    onchange={handleSearch}>
                </lightning-input>
                </div>
            
            <!-- TABLE -->
            <lightning-datatable
                key-field="Id"
                data={families}
                columns={columns}
                onrowaction={handleRowAction}
                onrowselection={handleRowSelection}>
            </lightning-datatable>

        </lightning-card>

    </template>


    
    <!-- MEMBER SCREEN (FULL PAGE SWITCH) -->
<template if:true={showMembers}>

    <c-member 
        family-id={selectedFamilyId}
        onbacktofamily={handleBack}>
    </c-member>

</template>

    <!-- ADD MODAL -->
    <template if:true={showModal}>
        <section class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container">

                <header class="slds-modal__header">
                    <h2>Add Family</h2>
                </header>

                <div class="slds-modal__content slds-p-around_medium">
                    <lightning-input 
                        label="Family Name"
                        required
                        onchange={handleFamilyName}>
                    </lightning-input>

                    <lightning-input
                        label="Head Name"
                        required
                        onchange={handleMemberName}>
                    </lightning-input>

                    <lightning-input
                        label="Address"
                        required
                        onchange={handleAddress}>
                    </lightning-input>

                    <lightning-input
                        type="number"
                        label="Age"
                        required
                        onchange={handleAge}>
                    </lightning-input>

                    <lightning-input
                        type="tel"
                        label="Phone"
                        maxlength="10"
                        pattern="[0-9]{10}"
                        message-when-pattern-mismatch="Enter valid 10 digit phone number"
                        required
                        onchange={handlePhone}>
                    </lightning-input>
                </div>

                <footer class="slds-modal__footer">
                    <lightning-button label="Cancel" onclick={closeModal}></lightning-button>
                    <lightning-button label="Save" variant="brand" onclick={saveFamily}></lightning-button>
                </footer>

            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>


    <!--  EDIT MODAL -->
    <template if:true={showEditModal}>
        <section class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container">

                <header class="slds-modal__header">
                    <h2>Edit Family</h2>
                </header>

                <div class="slds-modal__content slds-p-around_medium">
                    <lightning-input 
                        label="Family Name"
                        value={familyName}
                        onchange={handleFamilyName}>
                    </lightning-input>

                    <lightning-combobox
                    label="Head of Family"
                    value={selectedHeadId}
                    options={memberOptions}
                    placeholder="Select Head"
                    onchange={handleHeadChange}>
                </lightning-combobox>
                </div>

                <footer class="slds-modal__footer">
                    <lightning-button label="Cancel" onclick={closeEditModal}></lightning-button>
                    <lightning-button label="Update" variant="brand" onclick={updateFamilyHandler}></lightning-button>
                </footer>

            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>

    <!--  DELETE CONFIRM MODAL -->
    <template if:true={showDeleteModal}>
        <section class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container">

             p   <header class="slds-modal__header">
                    <h2>Confirm Delete</h2>
                </header>

                <div class="slds-modal__content slds-p-around_medium">
                    <p>Are you sure you want to delete "{familyName}"?</p>
                </div>

                <footer class="slds-modal__footer">
                    <lightning-button 
                        label="Cancel" 
                        onclick={closeDeleteModal}>
                    </lightning-button>

                    <lightning-button 
                        label="Delete" 
                        variant="destructive"
                        onclick={confirmDelete}>
                    </lightning-button>
                </footer>

            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>

</template>
